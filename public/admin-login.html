<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Baliwasan | Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-[#071c4d] to-[#0a2a6e] font-sans min-h-screen flex items-center justify-center p-4">
    
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-yellow-400 rounded-3xl mb-4 transform -rotate-3 shadow-2xl">
                <div class="w-20 h-20 bg-yellow-400 rounded-2xl flex items-center justify-center text-[#071c4d] text-4xl font-bold overflow-hidden">
                    <img src="resources/logo.png" alt="Barangay Logo" class="w-full h-full object-cover">
                </div>
            </div>
            <h1 class="text-3xl font-bold text-white">BARANGAY BALIWASAN</h1>
            <p class="text-yellow-300 mt-1">Management System</p>
        </div>
        
        <div class="bg-white rounded-3xl shadow-2xl p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Admin Login</h2>
            
            <div id="errorMessage" class="hidden mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm text-center"></div>
            
            <form onsubmit="handleLogin(event)" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" 
                           id="username"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400"
                           placeholder="Enter username">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" 
                           id="password"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400"
                           placeholder="Enter password">
                </div>
                
                <button type="submit" 
                        class="w-full bg-[#071c4d] text-white py-3 rounded-xl font-bold hover:bg-[#0a2a6e] transition-all">
                    Sign In
                </button>
            </form>
        </div>
        
        <p class="text-center text-white/60 text-xs mt-6">
            © 2026 Barangay Baliwasan. All rights reserved.
        </p>
    </div>

    <script>

        const validCredentials = {
            username: 'admin',
            password: 'admin123'
        };

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }
            

            if (username === validCredentials.username && password === validCredentials.password) {
                errorDiv.classList.add('hidden');
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('username', username);
                window.location.href = 'admin.html';
            } else {
                showError('Invalid username or password. Please try again.');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerHTML = message;
            errorDiv.classList.remove('hidden');
            
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 3000);
        }
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });


        window.addEventListener('load', function() {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
