<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Queue Monitor - Barangay Baliwasan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen w-screen overflow-hidden flex flex-col font-sans text-gray-900">

    <div class="relative flex justify-between items-center p-6 w-full bg-white shadow-md z-20 shrink-0">
        <div class="flex items-center gap-4">
            <img src="resources/logo.png" alt="Logo" class="w-13 h-14 rounded-full flex items-center justify-center text-black font-black text-xs text-center shadow-sm">
            <h1 class="text-2xl font-black text-gray-900 tracking-widest uppercase">BARANGAY BALIWASAN</h1>
        </div>
        <div class="flex items-center gap-4">
            <a href="index.html" class="border-2 border-gray-200 text-gray-500 px-6 py-2 rounded-full text-sm font-bold hover:border-[#FFD500] hover:text-black transition-colors uppercase tracking-wide bg-white">
                &larr; Exit
            </a>
        </div>
    </div>

    <main class="flex-1 flex flex-row w-full h-full overflow-hidden z-10">
        
        <section class="w-[65%] bg-black relative shadow-inner flex items-center justify-center overflow-hidden" id="media-container">
            <div class="w-full h-full bg-gray-900 flex items-center justify-center text-[#FFD500] font-black text-4xl uppercase opacity-20">
                Standby Media
            </div>
        </section>

        <aside class="w-[35%] bg-gray-50 flex flex-col shadow-[-10px_0_30px_rgba(0,0,0,0.1)] z-20 border-l border-gray-200 h-full">
            
            <div class="bg-[#FFF9E2] flex flex-col items-center justify-center p-8 border-b-8 border-[#FFD500] shrink-0">
                <h2 class="text-xl font-black text-gray-400 tracking-[0.2em] mb-2 uppercase">Now Serving</h2>
                
                <div id="current-ticket" class="text-gray-900 text-[8rem] font-black tracking-tighter leading-none mb-2 drop-shadow-sm">
                    ----
                </div>

                <div id="counter-badge" class="hidden bg-red-600 text-white font-black text-2xl px-6 py-2 rounded-xl uppercase tracking-widest mb-5 shadow-lg animate-pulse">
                    Proceed to Counter <span id="counter-number">1</span>
                </div>
                
                <div id="current-category" class="text-lg font-black text-black uppercase tracking-widest bg-[#FFE761] px-6 py-3 rounded-xl shadow-sm border border-[#FFDC2E] text-center w-full truncate">
                    STANDBY
                </div>
            </div>

            <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-100 shrink-0">
                <h2 class="text-lg font-black text-gray-900 uppercase tracking-wide">Waiting</h2>
                <span id="waiting-count" class="text-lg font-black text-black bg-[#FFD500] px-4 py-1 rounded-lg shadow-sm">0</span>
            </div>
            
            <div id="waiting-list-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-white inset-shadow-sm">
                <div class="w-full text-center text-gray-400 font-bold py-10 uppercase tracking-wider text-sm">Queue is empty</div>
            </div>
        </aside>

    </main>

    <footer class="h-12 bg-[#FFD500] text-black flex justify-between items-center px-8 shrink-0 z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] border-t border-[#FFDC2E]">
        <div id="date-display" class="text-xs font-bold w-1/3 text-left tracking-wider uppercase opacity-80">
            Loading Date...
        </div>
        <div id="time-display" class="text-xl font-black w-1/3 text-center tracking-widest">
            00:00:00
        </div>
        <div class="text-xs font-bold w-1/3 text-right uppercase tracking-widest opacity-80">
            Barangay Baliwasan Queue Monitor
        </div>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
