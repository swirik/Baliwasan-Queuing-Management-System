<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Queue Monitor - Barangay Baliwasan</title>
    <link href="output.css" rel="stylesheet">
    <style>
        @keyframes marquee {
            from { left: 100%; transform: translateX(0); }
            to { left: 0; transform: translateX(-100%); }
        }
        .animate-marquee {
            animation: marquee 25s linear infinite;
        }
        @keyframes flashText {
            0%, 100% { color: #111827; transform: scale(1); text-shadow: none; }
            50% { color: #FFD500; transform: scale(1.1); text-shadow: 0 0 20px rgba(255, 213, 0, 0.6); }
        }
        .is-blinking {
            animation: flashText 0.4s ease-in-out 6;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-gray-900 h-screen w-screen overflow-hidden flex flex-col font-sans text-white">

    <header class="h-20 bg-white text-gray-900 flex justify-between items-center px-8 shrink-0 z-30 shadow-md border-b-8 border-[#FFD500]">
        <div class="flex flex-col">
            <div id="clock-date" class="text-sm font-bold uppercase tracking-wider text-gray-500">Loading Date...</div>
            <div id="clock-time" class="text-3xl font-black tracking-widest leading-none text-black">00:00:00</div>
        </div>
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black tracking-widest uppercase text-black">BARANGAY BALIWASAN QUEUE SYSTEM</h1>
            <img src="resources/logo.png" alt="Logo" class="w-12 h-12 object-contain">
        </div>
    </header>

    <main style="display: grid; grid-template-columns: 25% 50% 25%; width: 100%; height: 100%;" class="flex-1 overflow-hidden bg-gray-100 text-gray-900">
        
        <aside class="bg-white border-r border-gray-300 flex flex-col shadow-lg z-20 overflow-hidden">
            <div class="bg-[#FFD500] p-5 text-center shrink-0 border-b-4 border-[#FFDC2E]">
                <h2 class="text-2xl font-black text-black tracking-widest uppercase">QUEUE</h2>
            </div>
            <div class="p-3 border-b border-gray-200 flex justify-between items-center bg-gray-50 shrink-0">
                <span class="text-xs font-bold text-gray-500 uppercase tracking-wide">Waiting</span>
                <span id="waiting-count" class="text-sm font-black text-[#FFD500] bg-black px-3 py-1 rounded-lg">0</span>
            </div>
            <div id="waiting-list-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-100 inset-shadow-sm">
                <div class="w-full text-center text-gray-400 font-bold py-10 uppercase tracking-wider text-sm">Queue is empty</div>
            </div>
        </aside>

        <section class="bg-black relative shadow-inner flex items-center justify-center overflow-hidden" id="media-container">
            <div class="w-full h-full bg-gray-900 flex items-center justify-center text-[#FFD500] font-black text-4xl uppercase opacity-20">
                Standby Media
            </div>
        </section>

        <aside class="bg-white border-l border-gray-300 flex flex-col shadow-[-10px_0_30px_rgba(0,0,0,0.1)] z-20 overflow-hidden">
            <div class="bg-[#FFD500] p-5 text-center shrink-0 border-b-4 border-[#FFDC2E]">
                <h2 class="text-2xl font-black text-black tracking-widest uppercase">NOW SERVING</h2>
            </div>
            <div class="flex-1 flex flex-col items-center justify-center p-8 bg-[#FFF9E2]">
                <div class="w-full flex flex-col items-center text-center">
                    <div class="text-sm font-bold text-gray-500 mb-2 uppercase tracking-widest">TICKET NUMBER</div>
                    <div id="current-ticket" class="text-[6rem] xl:text-[7rem] font-black text-gray-900 mb-8 drop-shadow-sm leading-none transition-all">----</div>
                    <div class="text-sm font-bold text-gray-500 mb-2 uppercase tracking-widest">PROCEED TO</div>
                    <div id="current-counter" class="text-4xl xl:text-5xl font-black text-black bg-[#FFD500] px-8 py-4 rounded-3xl shadow-lg uppercase tracking-widest border-4 border-[#FFDC2E] w-full text-center">--</div>
                    <div id="current-doc" class="mt-8 text-xs font-bold text-[#FFD500] bg-black px-4 py-2 rounded-md text-center w-full truncate uppercase tracking-widest">SYSTEM STANDBY</div>
                </div>
            </div>
        </aside>

    </main>

    <footer class="h-16 bg-gray-900 text-white flex items-center overflow-hidden shrink-0 border-t-4 border-[#FFD500] relative">
        <div class="bg-[#FFD500] text-black h-full px-8 flex items-center justify-center font-black tracking-widest uppercase z-20 shadow-[10px_0_15px_rgba(0,0,0,0.3)] shrink-0 text-xl border-r-4 border-[#FFDC2E]">
            ANNOUNCEMENT
        </div>
        <div class="flex-1 overflow-hidden relative h-full flex items-center bg-gray-900">
            <div class="absolute animate-marquee font-black text-2xl tracking-widest text-[#FFD500]" id="scrolling-ticker" style="white-space: nowrap;">
                WELCOME TO BARANGAY BALIWASAN
            </div>
        </div>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
